<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Legatus Services | CA Expert</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="logo.png">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body>
  <app-root></app-root>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script>
    // ─── CUSTOM CURSOR ───
    setTimeout(() => {
      const dot = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');
      let mx = 0, my = 0, rx = 0, ry = 0;
      document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
      function animateCursor() {
        if (!dot || !ring) return;
        dot.style.transform = `translate(${mx - 4}px, ${my - 4}px)`;
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.transform = `translate(${rx - 16}px, ${ry - 16}px)`;
        requestAnimationFrame(animateCursor);
      }
      animateCursor();

      document.addEventListener('mouseenter', (e) => {
        if (e.target && (e.target.tagName === 'A' || e.target.tagName === 'BUTTON')) {
          if (ring) {
            ring.style.width = '48px'; ring.style.height = '48px';
            ring.style.borderColor = 'rgba(201,168,76,0.6)';
          }
        }
      }, true);
      document.addEventListener('mouseleave', (e) => {
        if (e.target && (e.target.tagName === 'A' || e.target.tagName === 'BUTTON')) {
          if (ring) {
            ring.style.width = '32px'; ring.style.height = '32px';
            ring.style.borderColor = 'var(--gold)';
          }
        }
      }, true);

      // ─── SCROLL PROGRESS ───
      window.addEventListener('scroll', () => {
        const scrollP = document.getElementById('scrollProgress');
        if (scrollP) {
          const scrolled = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
          scrollP.style.width = scrolled + '%';
        }

        // Navbar shrink
        const nav = document.querySelector('.navbar');
        if (nav) nav.classList.toggle('scrolled', window.scrollY > 60);

        // Back to top
        const bt = document.getElementById('backTop');
        if (bt) bt.classList.toggle('show', window.scrollY > 400);
      });
    }, 1000);
  </script>
</body>

</html>
